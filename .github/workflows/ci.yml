name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: read

jobs:
  build-and-test:
    name: Build & Test (JVM + JS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lib
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run JVM tests
        run: ./gradlew :bertlv-emv:jvmTest :console-emv:jvmTest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
