name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  packages: read

jobs:
  build-and-test:
    name: Build & Test (JVM + JS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lib
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run JVM tests
        run: ./gradlew :bertlv-emv:jvmTest :console-emv:jvmTest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run JS tests
        run: ./gradlew :bertlv-emv:jsTest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate web JS artifacts
        run: ./gradlew :bertlv-emv:copyJsToWebPlugin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check web JS artifacts are up-to-date
        id: staleness
        run: |
          if git diff --quiet -- ../plugin/bertlv_emv_web/web/assets/js/; then
            echo "All web JS artifacts are up-to-date."
            echo "stale=false" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Web JS artifacts were stale and have been regenerated."
            git diff --stat -- ../plugin/bertlv_emv_web/web/assets/js/
            echo "stale=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-commit regenerated JS artifacts
        if: github.event_name == 'push' && steps.staleness.outputs.stale == 'true'
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugin/bertlv_emv_web/web/assets/js/
          git commit -m "chore: regenerate web JS artifacts [skip ci]"
          git push

      - name: Fail PR if artifacts are stale
        if: github.event_name == 'pull_request' && steps.staleness.outputs.stale == 'true'
        run: |
          echo "::error::Web JS artifacts are stale. Regenerate with './gradlew :bertlv-emv:copyJsToWebPlugin' and commit, or merge to main where CI will auto-fix."
          exit 1
