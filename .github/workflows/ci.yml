name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: read

jobs:
  build-and-test:
    name: Build & Test (JVM + JS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lib
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run JVM tests
        run: ./gradlew :bertlv-emv:jvmTest :console-emv:jvmTest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run JS tests
        run: ./gradlew :bertlv-emv:jsTest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check web JS artifacts are up-to-date
        run: |
          ./gradlew :bertlv-emv:jsBrowserProductionLibraryDistribution
          DIST=bertlv-emv/build/dist/js/productionLibrary
          WEB=../plugin/bertlv_emv_web/web/assets/js

          for f in kotlin-kotlin-stdlib.js bitfield-parser.js emv-tools-bertlv-emv.js; do
            if ! diff -q "$DIST/$f" "$WEB/$f" > /dev/null 2>&1; then
              echo "::error::Stale web artifact: $f differs from freshly built JS."
              echo "Run './gradlew :bertlv-emv:copyJsToWebPlugin' and commit the updated files."
              STALE=1
            fi
          done

          if [ "${STALE:-0}" = "1" ]; then
            exit 1
          fi
          echo "All web JS artifacts are up-to-date."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
