# ffigen configuration for bertlv-emv native bindings
# Run: dart run ffigen --config ffigen.yaml
#
# Input: C headers generated by Kotlin/Native when building sharedLib
# Output: Dart FFI bindings

name: BertlvEmvBindings
description: FFI bindings for the bertlv-emv Kotlin/Native shared library
output: lib/src/ffi_bindings.g.dart

# C header generated by Kotlin/Native sharedLib build
# Located at: lib/bertlv-emv/build/bin/<target>/releaseShared/bertlv_emv_api.h
headers:
  entry-points:
    - '../../lib/bertlv-emv/build/bin/androidNativeArm64/releaseShared/libbertlv_emv_api.h'

# Only include our exported functions
functions:
  include:
    - 'emv_.*'

# No structs/enums/typedefs needed (pure string-based API)
structs:
  include: []
enums:
  include: []
typedefs:
  include: []
