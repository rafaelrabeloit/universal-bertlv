name: bertlv_emv_mobile
description: >-
  Universal BERTLV-EMV — Android and iOS implementation of bertlv_emv using
  Kotlin/Native + dart:ffi.
version: 0.0.7
homepage: https://github.com/rafaelrabeloit/emv-tools

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0
  bertlv_emv:
    path: ../bertlv_emv

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  ffigen: ^14.0.0

flutter:
  plugin:
    implements: bertlv_emv
    platforms:
      android:
        package: com.example.bertlv_emv
        pluginClass: BertlvEmvPlugin
        dartPluginClass: BertlvEmvMobile
        ffiPlugin: true
      ios:
        pluginClass: BertlvEmvPlugin
        dartPluginClass: BertlvEmvMobile
        ffiPlugin: true
